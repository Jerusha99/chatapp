name: chat_bruce
description: Chat Bruce - Real-time messaging app
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  supabase_flutter: ^2.5.0
  flutter_riverpod: ^2.4.0
  riverpod_annotation: ^2.3.0
  go_router: ^14.2.0
  dio: ^5.4.0
  flutter_secure_storage: ^9.0.0
  hive: ^2.2.3
  hive_flutter: ^1.1.0
  flutter_animate: ^4.5.0
  animated_text_kit: ^4.2.2
  lottie: ^3.1.0
  cached_network_image: ^3.3.0
  flutter_svg: ^2.0.10
  flutter_dotenv: ^5.1.0
  intl: ^0.19.0
  path: ^1.8.0
  image_picker: ^1.0.0
  record: ^5.0.0
  permission_handler: ^11.3.0
  cupertino_icons: ^1.0.6
  font_awesome_flutter: ^10.7.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.0
  riverpod_generator: ^2.4.0
  hive_generator: ^2.0.0

flutter:
  uses-material-design: true
  assets:
    - assets/
